<form
  [formGroup]="form"
  (ngSubmit)="onSubmit()"
  class="w-full h-full mx-auto mt-10 p-6 bg-white rounded-2xl shadow-lg space-y-6"
>

  <!-- Title -->
  <h2 class="text-2xl font-bold text-gray-800 text-center">
    Create Exchange
  </h2>

  <!-- Exchange Name -->
  <div class="flex flex-col gap-2">
    <label class="text-sm font-medium text-gray-700">
      Exchange Name
    </label>

    <input
      type="text"
      formControlName="name"
      placeholder="Enter exchange name"
      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
    />
  </div>

  <!-- Exchange Type -->
  <div class="flex flex-col gap-2">
    <label class="text-sm font-medium text-gray-700">
      Exchange Type
    </label>

    <select
      formControlName="type"
      class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
    >
      <option *ngFor="let t of exchangeTypes" [value]="t">
        {{ t }}
      </option>
    </select>
  </div>

  <button
    type="submit"
    class="w-full py-2 rounded-lg font-semibold text-white transition
           bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed"
  >
    Create Exchange
  </button>

</form>
