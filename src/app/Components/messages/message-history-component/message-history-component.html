<div class="p-6">

  <div class="mb-6">
    <h2 class="text-2xl font-bold text-gray-800">
      Message History
    </h2>
    <p class="text-sm text-gray-500">
      Lifecycle of the selected broker message
    </p>
  </div>

  <div *ngIf="history.length; else noHistory" class="h-full overflow-y-scroll">

    <div class="relative">

      <div
        class="absolute left-3 top-0 h-full w-0.5 bg-gray-200"
      ></div>

      <div
        *ngFor="let item of history"
        class="relative flex gap-4 pb-8"
      >
        <div
          class="z-10 mt-1 h-6 w-6 rounded-full border-4 border-white bg-blue-500 shadow"
        ></div>

        <div
          class="flex-1 rounded-xl border border-gray-200 bg-white p-4 shadow-sm"
        >
          <div
            class="mb-2 flex flex-col gap-2 md:flex-row md:items-center md:justify-between"
          >
            <span
              class="inline-flex w-fit rounded-full bg-blue-100 px-3 py-1 text-xs font-semibold text-blue-700"
            >
              {{ item.state }}
            </span>

            <span class="text-sm text-gray-500">
              {{ item.time | date:'dd/MM/yyyy HH:mm:ss' }}
            </span>
          </div>

          <p class="text-sm leading-relaxed text-gray-700">
            {{ item.details }}
          </p>
        </div>
      </div>

    </div>

  </div>

  <ng-template #noHistory>
    <div
      class="rounded-lg border border-dashed border-gray-300 py-12 text-center"
    >
      <p class="text-gray-500">
        No history available for this message.
      </p>
    </div>
  </ng-template>

</div>
