<div class="space-y-4">

  <h1 class="text-2xl font-bold">Queues</h1>

  <div class="bg-white rounded-xl shadow overflow-hidden">

    <table class="w-full text-sm">

      <thead class="bg-gray-100 text-left">
        <tr>
          <th class="p-3">Name</th>
          <th class="p-3">Ready</th>
          <th class="p-3">Processing</th>
          <th class="p-3">DLQ</th>
          <th class="p-3">Total</th>
          <th class="p-3">Action</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let q of queues" class="border-t hover:bg-gray-50 ">

          <td class="p-3 font-medium">{{ q.name }}</td>

          <td class="p-3 text-green-600">{{ q.ready }}</td>

          <td class="p-3 text-blue-600">{{ q.processing }}</td>

          <td class="p-3 text-red-600">{{ q.dlq }}</td>

          <td class="p-3 text-red-600">{{ q.totalMessages }}</td>

          <td class="p-3">
            <button class="px-3 py-1 bg-slate-900 text-white rounded">
              View
            </button>
          </td>

        </tr>
      </tbody>

    </table>

  </div>

</div>
